name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Checks for commit messages compliance
jobs:
  commitlint:
    name: Commit Message
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install --save-dev \
            @commitlint/cli \
            @commitlint/config-conventional

      - name: Lint commit messages
        run: |
          npx commitlint \
            --from HEAD~1 \
            --to HEAD \
            --verbose

  # Lint PHP code
  lint:
    name: PHP Lint (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Laravel Pint (lint check)
        run: ./vendor/bin/pint --test

  # Check Rector
  rector:
    name: Rector (Code Modernization)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Rector (dry-run)
        run: vendor/bin/rector --dry-run

  # Test Phpstan
  phpstan:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Cache PHPStan tmp
        uses: actions/cache@v4
        with:
          path: storage/tmp/phpstan
          key: phpstan-${{ hashFiles('composer.lock') }}-${{ github.sha }}
          restore-keys: |
            phpstan-${{ hashFiles('composer.lock') }}-
            phpstan-

      - name: Create PHPStan tmp directory
        run: mkdir -p storage/tmp/phpstan

      - name: Run PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress --error-format=github

  # Test Laravel code
  tests:
    name: 🧪 Tests Laravel
    runs-on: ubuntu-latest
    needs: lint

    services:
      pgsql:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: laravel_test
          POSTGRES_USER: laravel
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_pgsql
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env.testing

      - name: Configure .env.testing
        run: |
          cp .env.ci .env.testing
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env.testing
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/' .env.testing
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=laravel_test/' .env.testing
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=laravel/' .env.testing
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=secret/' .env.testing

      - name: Generate application key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test  --env=testing
